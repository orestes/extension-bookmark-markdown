<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Bookmark — Settings</title>
    <style>
      :root {
        --color-bg: #fff;
        --color-fg: #24292f;
        --color-fg-muted: #57606a;
        --color-border: #e1e4e8;
        --color-btn-bg: #0969da;
        --color-btn-bg-hover: #0860ca;
        --color-btn-fg: #fff;
        --color-btn-secondary-bg: #f6f8fa;
        --color-btn-secondary-bg-hover: #eaeef2;
        --color-btn-secondary-fg: #24292f;
        --color-btn-secondary-border: #d0d7de;
        --color-input-bg: #fff;
        --color-link: #0969da;
        --color-success: #1a7f37;
        --color-note-bg: #ddf4ff;
        --color-note-border: #54aeff;
        --color-note-fg: #0550ae;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #0d1117;
          --color-fg: #e6edf3;
          --color-fg-muted: #8b949e;
          --color-border: #30363d;
          --color-btn-bg: #0969da;
          --color-btn-bg-hover: #0860ca;
          --color-btn-fg: #fff;
          --color-btn-secondary-bg: #21262d;
          --color-btn-secondary-bg-hover: #30363d;
          --color-btn-secondary-fg: #e6edf3;
          --color-btn-secondary-border: #363b42;
          --color-input-bg: #161b22;
          --color-link: #58a6ff;
          --color-success: #3fb950;
          --color-note-bg: #051d4d;
          --color-note-border: #0550ae;
          --color-note-fg: #79c0ff;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        background: var(--color-bg);
        color: var(--color-fg);
        padding: 24px;
        max-width: 480px;
      }

      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 2px;
      }

      h2 {
        font-size: 13px;
        font-weight: 400;
        color: var(--color-fg-muted);
        margin-bottom: 20px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      .field[hidden] {
        display: none;
      }

      label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--color-fg-muted);
      }

      input[type="url"] {
        padding: 8px 10px;
        font-size: 14px;
        font-family: inherit;
        background: var(--color-input-bg);
        color: var(--color-fg);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        width: 100%;
      }

      input[type="url"]:focus {
        outline: 2px solid var(--color-btn-bg);
        outline-offset: -1px;
        border-color: transparent;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      button[type="submit"] {
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        color: var(--color-btn-fg);
        background: var(--color-btn-bg);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      button[type="submit"]:hover {
        background: var(--color-btn-bg-hover);
      }

      button[type="submit"]:disabled {
        opacity: 0.6;
        cursor: default;
      }

      button[type="button"] {
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        color: var(--color-btn-secondary-fg);
        background: var(--color-btn-secondary-bg);
        border: 1px solid var(--color-btn-secondary-border);
        border-radius: 8px;
        cursor: pointer;
      }

      button[type="button"]:hover {
        background: var(--color-btn-secondary-bg-hover);
      }

      .radio-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .radio-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: normal;
        text-transform: none;
        letter-spacing: normal;
        color: var(--color-fg);
        cursor: pointer;
      }

      .badge {
        font-size: 11px;
        font-weight: 500;
        color: var(--color-fg-muted);
        background: transparent;
        border: 1px solid var(--color-border);
        border-radius: 10px;
        padding: 1px 6px;
      }

      .note {
        font-size: 13px;
        color: var(--color-note-fg);
        background: var(--color-note-bg);
        border: 1px solid var(--color-note-border);
        border-radius: 6px;
        padding: 10px 12px;
        margin-top: 4px;
        line-height: 1.5;
      }

      .note a {
        color: var(--color-note-fg);
      }

      #status {
        font-size: 13px;
        color: var(--color-fg-muted);
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      #status.fading {
        opacity: 0;
      }

      #status.success {
        color: var(--color-success);
      }

      #status a {
        color: var(--color-link);
      }
    </style>
  </head>
  <body>
    <h1>Bookmark as Markdown</h1>
    <h2>Options</h2>
    <form id="settings-form">
      <div class="field">
        <label>Save mode</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="saveMode" value="download" />
            Download file
            <span class="badge">default</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="saveMode" value="server" />
            Send to server
          </label>
        </div>
        <p id="server-note" class="note" hidden>
          Requires a running compatible server.
          <a
            href="https://github.com/orestes/extension-bookmark-markdown/blob/main/docs/server.md"
            target="_blank"
            rel="noopener noreferrer"
            >See the docs</a
          >
          for setup instructions.
        </p>
      </div>
      <div class="field" id="endpoint-field" hidden>
        <label for="endpoint">API endpoint</label>
        <input type="url" id="endpoint" />
      </div>
      <div class="actions">
        <button id="submit-btn" type="submit">Save</button>
        <button id="reset-btn" type="button">Reset to defaults</button>
        <span id="status"></span>
      </div>
    </form>
    <script src="options.js"></script>
  </body>
</html>

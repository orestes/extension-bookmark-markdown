<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Bookmark</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      :root {
        --color-bg: #fff;
        --color-fg: #24292f;
        --color-fg-muted: #57606a;
        --color-fg-subtle: #8b949e;
        --color-border: #e1e4e8;
        --color-card-bg: #fff;
        --color-btn-bg: #0969da;
        --color-btn-bg-hover: #0860ca;
        --color-btn-disabled-bg: #8b949e;
        --color-btn-disabled-fg: #fff;
        --color-btn-fg: #fff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #0d1117;
          --color-fg: #e6edf3;
          --color-fg-muted: #8b949e;
          --color-fg-subtle: #8b949e;
          --color-border: #30363d;
          --color-card-bg: #161b22;
          --color-btn-bg: #0969da;
          --color-btn-bg-hover: #0860ca;
          --color-btn-disabled-bg: #30363d;
          --color-btn-disabled-fg: #8b949e;

          --choices-primary-color: #38daff;
          --choices-text-color: white;
          --choices-item-color: black;
          --choices-bg-color: #101010;
          --choices-bg-color-dropdown: #101010;
          --choices-keyline-color: #3b3e40;
          --choices-bg-color-disabled: #181a1b;
          --choices-item-disabled-color: #eee;
          --choices-disabled-color: #2d2d2d;
          --choices-highlighted-color: #16292d;
          --choices-icon-cross: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjEiIGhlaWdodD0iMjEiIHZpZXdCb3g9IjAgMCAyMSAyMSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSIjMDAwIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxwYXRoIGQ9Ik0yLjU5Mi4wNDRsMTguMzY0IDE4LjM2NC0yLjU0OCAyLjU0OEwuMDQ0IDIuNTkyeiIvPjxwYXRoIGQ9Ik0wIDE4LjM2NEwxOC4zNjQgMGwyLjU0OCAyLjU0OEwyLjU0OCAyMC45MTJ6Ii8+PC9nPjwvc3ZnPg==");
          --choices-icon-cross-inverse: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjEiIGhlaWdodD0iMjEiIHZpZXdCb3g9IjAgMCAyMSAyMSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSIjRkZGIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxwYXRoIGQ9Ik0yLjU5Mi4wNDRsMTguMzY0IDE4LjM2NC0yLjU0OCAyLjU0OEwuMDQ0IDIuNTkyeiIvPjxwYXRoIGQ9Ik0wIDE4LjM2NEwxOC4zNjQgMGwyLjU0OCAyLjU0OEwyLjU0OCAyMC45MTJ6Ii8+PC9nPjwvc3ZnPg==");
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 360px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        background: var(--color-bg);
        color: var(--color-fg);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #preview-card {
        border: 1px solid var(--color-border);
        border-radius: 12px;
        overflow: hidden;
      }

      #preview-image {
        display: block;
        width: 100%;
        aspect-ratio: 1.91 / 1;
        object-fit: cover;
      }

      #preview-text {
        background: var(--color-card-bg);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      #preview-domain {
        font-size: 12px;
        color: var(--color-fg-subtle);
        text-transform: lowercase;
      }

      #preview-title {
        font-weight: 600;
        color: var(--color-fg);
        line-height: 1.3;
      }

      #preview-description {
        font-size: 13px;
        color: var(--color-fg-muted);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .field-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--color-fg-subtle);
        margin-bottom: 4px;
      }

      #tags-section {
        display: flex;
        flex-direction: column;
      }

      .choices__input {
        color: var(--color-fg);
      }

      #save {
        display: block;
        width: 100%;
        padding: 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--color-btn-fg);
        background: var(--color-btn-bg);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      #save:disabled {
        background: var(--color-btn-disabled-bg);
        color: var(--color-btn-disabled-fg);
        cursor: default;
      }

      #save:not(:disabled):hover {
        background: var(--color-btn-bg-hover);
      }

      #save[data-state="saving"] {
        opacity: 0.7;
        cursor: default;
      }

      #save[data-state="saved"] {
        background: #1a7f37;
      }

      #save[data-state="error"] {
        background: #cf222e;
      }

      #save[data-state="saved"]:disabled,
      #save[data-state="error"]:disabled {
        color: #fff;
      }

      @media (prefers-color-scheme: dark) {
        #save[data-state="saved"] {
          background: #2ea043;
        }

        #save[data-state="error"] {
          background: #da3633;
        }

        #save[data-state="saved"]:disabled,
        #save[data-state="error"]:disabled {
          color: #fff;
        }
      }

      #save-error {
        font-size: 12px;
        color: var(--color-fg-muted);
        margin-top: 4px;
      }

      #save-error a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div id="preview-card">
      <img id="preview-image" hidden />
      <div id="preview-text">
        <span id="preview-domain"></span>
        <span id="preview-title"></span>
        <span id="preview-description"></span>
      </div>
    </div>

    <div id="tags-section" hidden>
      <div class="field-label">Custom tags</div>
      <input id="tags-input" type="text" />
    </div>

    <button id="save" disabled>Save</button>
    <p id="save-error" hidden></p>
    <script src="popup.js"></script>
  </body>
</html>
